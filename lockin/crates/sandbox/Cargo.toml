[package]
name = "lockin"
version = "0.3.0"
edition = "2021"

[package.metadata.dist]
dist = false

[features]
default = []
tokio = ["dep:tokio"]

[dependencies]
anyhow = "1.0"
lockin-process = { path = "../process" }
libc = "0.2"
tempfile = "3.13"
tokio = { version = "1", features = ["macros", "process", "rt", "signal", "sync", "time"], optional = true }

[dev-dependencies]
lockin-testkit = { path = "../testkit" }
tokio = { version = "1", features = ["macros", "process", "rt"] }

[[test]]
name = "tokio"
required-features = ["tokio"]
