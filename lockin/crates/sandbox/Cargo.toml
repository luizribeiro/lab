[package]
name = "lockin"
version = "0.4.0"
edition = "2021"

[package.metadata.dist]
dist = false

[features]
default = []
tokio = ["dep:tokio"]
test-fixture = []

[[bin]]
name = "fake-syd"
path = "tests/bin/fake_syd.rs"
required-features = ["test-fixture"]

[dependencies]
anyhow = "1.0"
lockin-process = { path = "../process" }
libc = "0.2"
tempfile = "3.13"
tokio = { version = "1", features = ["macros", "process", "rt", "signal", "sync", "time"], optional = true }

[dev-dependencies]
lockin-testkit = { path = "../testkit" }
tokio = { version = "1", features = ["macros", "process", "rt"] }

[[test]]
name = "tokio"
required-features = ["tokio"]

[[test]]
name = "fake_syd_records_cargo_bin_exe_env_when_set_explicitly"
required-features = ["test-fixture"]

[[test]]
name = "fake_syd_records_cargo_bin_exe_env_from_sibling"
required-features = ["test-fixture"]

[[test]]
name = "fake_syd_resolution_fails_hard_when_pty_missing"
required-features = ["test-fixture"]

[[test]]
name = "fake_syd_records_cargo_bin_exe_env_after_env_clear"
required-features = ["test-fixture"]
