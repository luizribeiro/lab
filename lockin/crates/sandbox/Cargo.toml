[package]
name = "lockin"
version = "0.1.0"
edition = "2021"

[features]
default = []
tokio = ["dep:tokio"]

[dependencies]
anyhow = "1.0"
lockin-process = { path = "../process" }
libc = "0.2"
tempfile = "3.13"
tokio = { version = "1", features = ["process"], optional = true }

[dev-dependencies]
capsa-test-support = { path = "../../../capsa/crates/test-support" }
tokio = { version = "1", features = ["macros", "process", "rt"] }

[[test]]
name = "tokio"
required-features = ["tokio"]
