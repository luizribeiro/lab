[package]
name = "lockin-trace"
version = "0.4.0"
edition = "2021"
description = "Runtime denial-tracing for lockin (run a program under enforcement and report what got denied)."
license = "MIT"
repository = "https://github.com/luizribeiro/lab"
homepage = "https://github.com/luizribeiro/lab/tree/main/lockin"
publish = false

[package.metadata.dist]
dist = false

[dependencies]
anyhow = "1"
lockin = { path = "../sandbox", features = ["tokio"] }
lockin-config = { path = "../config" }
lockin-observe = { path = "../observe" }
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

[dev-dependencies]
tempfile = "3"
