[[readers]]
name = "example"
command = ["python3", "examples/reader_plugin.py"]
routes = [{ host = "example.com" }]
priority = 100

[[readers]]
name = "wikipedia"
command = ["python3", "examples/wikipedia_plugin.py"]
routes = [{ host_suffix = "wikipedia.org", path_prefix = "/wiki/" }]
priority = 100

[[search_providers]]
name = "example"
command = ["python3", "examples/search_plugin.py"]

[[search_providers]]
name = "wikipedia"
command = ["python3", "examples/wikipedia_search_plugin.py"]
