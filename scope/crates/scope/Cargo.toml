[package]
name = "scope"
version = "0.1.1"
edition = "2021"
description = "Non-interactive CLI web browser for AI agents (search, read URLs as markdown)."
license = "MIT"
repository = "https://github.com/luizribeiro/lab"
homepage = "https://github.com/luizribeiro/lab/tree/main/scope"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
html-to-markdown-rs = "3.3"
regex = "1"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "gzip", "brotli", "deflate"] }
scraper = "0.20"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread", "process", "time", "io-util", "fs"] }
toml = "0.8"
url = "2"

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
