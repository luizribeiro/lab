[package]
name = "rafaello"
version = "0.0.0"
edition = "2021"
description = "Minimal, customizable coding agent (early scaffolding; no implementation yet)."
license = "MIT"
repository = "https://github.com/luizribeiro/lab"
homepage = "https://github.com/luizribeiro/lab/tree/main/rafaello"

[lib]
path = "src/lib.rs"

[[bin]]
name = "rfl"
path = "src/main.rs"

[dependencies]
rafaello-core = { path = "../rafaello-core" }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
clap = { workspace = true, features = ["derive"] }
anyhow = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
parking_lot = { workspace = true }
rusqlite = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
tracing-test = { workspace = true }
nix = { workspace = true }
rusqlite = { workspace = true }
chrono = { workspace = true }
