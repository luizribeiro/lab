[package]
name = "rafaello-core"
version = "0.0.0"
edition = "2021"
description = "Core library for rafaello (manifest, lock, compiler; early scaffolding)."
license = "MIT"
repository = "https://github.com/luizribeiro/lab"
homepage = "https://github.com/luizribeiro/lab/tree/main/rafaello"

[dependencies]
thiserror = { workspace = true }
toml = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
semver = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
data-encoding = { workspace = true }
outpost = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
fittings-core = { workspace = true }
fittings-server = { workspace = true }
fittings-client = { workspace = true }
fittings-transport = { workspace = true }
lockin = { workspace = true }
outpost-proxy = { workspace = true }
nix = { workspace = true }
parking_lot = { workspace = true }
anyhow = { workspace = true }
rusqlite = { workspace = true }
ulid = { workspace = true }
jsonschema = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
serial_test = { workspace = true }
tracing-test = { workspace = true, features = ["no-env-filter"] }
tracing-subscriber = { workspace = true }
tokio-util = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[features]
test-fixture = []

[[bin]]
name = "rfl-bus-fixture"
path = "src/bin/rfl_bus_fixture.rs"
required-features = ["test-fixture"]
