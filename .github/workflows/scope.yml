name: scope

on:
  push:
    paths:
      - "scope/**"
      - "shared/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/scope.yml"
  pull_request:
    paths:
      - "scope/**"
      - "shared/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/scope.yml"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/flakehub-cache-action@v2

      - name: Run tests
        run: |
          nix develop .#scope --impure -L --command \
            cargo test --manifest-path scope/Cargo.toml --workspace
