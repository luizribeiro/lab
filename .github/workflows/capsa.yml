name: capsa

# TODO: add macOS CI (needs Virtualization.framework support in libkrun)

on:
  push:
    branches: [main]
    paths:
      - "capsa/**"
      - "lockin/**"
      - "outpost/**"
      - "shared/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/capsa.yml"
  pull_request:
    paths:
      - "capsa/**"
      - "lockin/**"
      - "outpost/**"
      - "shared/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/capsa.yml"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - uses: DeterminateSystems/nix-installer-action@v16
        with:
          determinate: true

      - uses: DeterminateSystems/magic-nix-cache-action@c6a5746789488c8753af0d61fc6b5d79a80391f3
        with:
          use-flakehub: false

      - name: Run tests
        run: |
          nix develop .#capsa --impure -L --command bash -c '
            cargo build --manifest-path capsa/Cargo.toml -p capsa-core --bin capsa-fake-netd &&
            cargo test --manifest-path capsa/Cargo.toml --workspace
          '

      - name: Run nix checks
        # --max-jobs 1 serializes the VM checks. Concurrent VMs on a
        # ~2-4 core runner oversubscribe the scheduler and occasionally
        # starve a guest's init long enough to exceed the per-check
        # expect timeout; running them serially adds ~1 minute total
        # and eliminates the flake.
        run: nix flake check --impure -L --max-jobs 1
