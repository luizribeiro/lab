[package]
name = "outpost-proxy"
version = "0.1.0"
edition = "2021"

[dependencies]
outpost = { path = "../outpost" }
tokio = { version = "1.45", features = ["io-util", "macros", "net", "rt", "sync", "time"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.45", features = ["io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
